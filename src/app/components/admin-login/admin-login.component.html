<div class="min-h-[calc(100vh)] flex flex-col md:flex-row bg-hit-cream overflow-hidden" dir="rtl">
  
  <!-- Right Side (Login Form) -->
  <div class="w-full md:w-1/2 lg:w-5/12 xl:w-1/3 flex flex-col justify-center px-8 md:px-12 lg:px-16 bg-white relative z-10 shadow-[0_0_40px_rgba(0,0,0,0.1)] min-h-screen">
    
    <!-- Pattern/Decorations -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-hit-orange/10 rounded-bl-full -z-10"></div>
    <div class="absolute bottom-0 left-0 w-24 h-24 bg-hit-red/5 rounded-tr-full -z-10"></div>
    
    <div class="w-full max-w-sm mx-auto">
      <!-- Header -->
      <div class="mb-10 text-right">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-hit-red text-white rounded-2xl mb-6 shadow-lg shadow-hit-red/30 transform hover:scale-110 transition-transform duration-300">
          <i class="fas fa-shield-alt text-2xl"></i>
        </div>
        <h1 class="text-3xl font-black text-hit-darkred mb-2 tracking-tight">مرحباً بعودتك</h1>
        <p class="text-gray-500 text-sm leading-relaxed">أدخل بيانات الحساب للوصول إلى نظام الإدارة</p>
      </div>

      <!-- Error Alert -->
      <div *ngIf="error" class="mb-6 p-4 bg-red-50 border border-red-100 rounded-xl flex items-start gap-3 animate-fade-in">
        <i class="fas fa-exclamation-circle text-red-500 mt-0.5"></i>
        <p class="text-sm text-red-600 font-medium">{{ error }}</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="submit()" class="space-y-5">
        
        <!-- Username -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-700">اسم المستخدم</label>
          <div class="relative group">
            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400 group-focus-within:text-hit-orange transition-colors">
              <i class="fas fa-user"></i>
            </div>
            <input [(ngModel)]="username" name="username" type="text" placeholder="أدخل اسم المستخدم (admin / cashier)" autocomplete="off"
              class="w-full bg-gray-50/50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-2 focus:ring-hit-orange/20 focus:border-hit-orange block pr-11 pl-4 py-3.5 transition-all outline-none hover:bg-gray-50" />
          </div>
        </div>
        
        <!-- Password -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-700">كلمة المرور</label>
          <div class="relative group">
            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400 group-focus-within:text-hit-orange transition-colors">
              <i class="fas fa-lock"></i>
            </div>
            <input [(ngModel)]="password" name="password" type="password" placeholder="أدخل كلمة المرور"
              class="w-full bg-gray-50/50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-2 focus:ring-hit-orange/20 focus:border-hit-orange block pr-11 pl-4 py-3.5 transition-all outline-none hover:bg-gray-50" />
          </div>
        </div>
        
        <!-- Submit Button -->
        <button type="submit" [disabled]="loading"
          class="w-full text-white bg-gradient-to-l from-hit-red to-hit-orange hover:from-hit-darkred hover:to-hit-red focus:ring-4 focus:outline-none focus:ring-hit-red/30 font-bold rounded-xl text-base px-5 py-4 mt-2 text-center transition-all shadow-lg shadow-hit-red/20 disabled:opacity-70 disabled:cursor-not-allowed transform hover:-translate-y-0.5 active:translate-y-0">
          <i class="fas fa-circle-notch fa-spin ml-2" *ngIf="loading"></i>
          {{ loading ? 'جاري التحقق...' : 'تسجيل الدخول' }}
        </button>
        
      </form>
      
      <!-- Footer -->
      <div class="mt-12 pt-6 border-t border-gray-100 text-center">
        <p class="text-[11px] text-gray-400 font-medium">© 2026 نظام إدارة مغسلة هيت. جميع الحقوق محفوظة.</p>
      </div>
    </div>
  </div>

  <!-- Left Side (Image & Branding) -->
  <div class="hidden md:block flex-1 relative bg-hit-dark">
    <!-- Image -->
    <img src="https://z-cdn-media.chatglm.cn/files/0646e91e-2aeb-476e-b5a0-fd956a43a963.jpeg?auth_key=1882721456-002f0733f77c466884141c24f970d7b8-0-5a0401cbd8892c70224e0125f317468d" 
         alt="مغسلة هيت" 
         class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-50" />
    
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-br from-hit-deepred/95 via-hit-red/90 to-hit-orange/80"></div>
    
    <!-- Pattern Overlay -->
    <div class="absolute inset-0" style="background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px); background-size: 32px 32px;"></div>

    <!-- Content -->
    <div class="absolute inset-0 flex flex-col justify-center items-center text-center px-12">
      <!-- Glass Card -->
      <div class="bg-white/10 backdrop-blur-md border border-white/20 p-12 rounded-[2rem] shadow-2xl transform hover:scale-105 transition-transform duration-500 w-full max-w-lg relative overflow-hidden">
        <!-- Shine effect -->
        <div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/10 to-white/0 translate-x-[-100%] hover:translate-x-[100%] transition-transform duration-1000"></div>
        
        <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-black/20 transform -rotate-3 hover:rotate-0 transition-transform duration-300">
          <span class="text-hit-red font-black text-5xl">H</span>
        </div>
        <h2 class="text-4xl font-black text-white mb-5 drop-shadow-lg tracking-tight">نظام الإدارة المتقدم</h2>
        <p class="text-white/90 text-lg max-w-sm mx-auto leading-relaxed font-light">
          تحكم كامل في مبيعات وخدمات مغسلة هيت عبر واجهة حديثة، سريعة، وسهلة الاستخدام.
        </p>
        
        <!-- Stats or Features (Decorative) -->
        <div class="mt-10 flex justify-center gap-8">
          <div class="text-center group">
            <div class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center mx-auto mb-3 text-hit-lightorange group-hover:bg-hit-orange group-hover:text-white transition-all duration-300 shadow-inner">
              <i class="fas fa-chart-line text-xl"></i>
            </div>
            <span class="text-sm font-medium text-white/80">تقارير دقيقة</span>
          </div>
          <div class="text-center group">
            <div class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center mx-auto mb-3 text-hit-lightorange group-hover:bg-hit-orange group-hover:text-white transition-all duration-300 shadow-inner">
              <i class="fas fa-users text-xl"></i>
            </div>
            <span class="text-sm font-medium text-white/80">إدارة الموظفين</span>
          </div>
          <div class="text-center group">
            <div class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center mx-auto mb-3 text-hit-lightorange group-hover:bg-hit-orange group-hover:text-white transition-all duration-300 shadow-inner">
              <i class="fas fa-bolt text-xl"></i>
            </div>
            <span class="text-sm font-medium text-white/80">أداء سريع</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
